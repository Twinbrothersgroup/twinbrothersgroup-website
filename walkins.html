<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#cc1414" />
<title>TBG Walk-Ins</title>
<link rel="icon" href="/icons/icon.svg" />
<link rel="manifest" href="/walkins.webmanifest" />
<style>
  :root{
    --bg:#0a0a0a; --panel:#141414; --panel2:#1c1c1c; --line:#2a2a2a;
    --red:#cc1414; --red-soft:#e23b3b; --txt:#f2f2f2; --muted:#9a9a9a;
    --green:#28a745; --blue:#3b82f6; --orange:#f59e0b; --gray:#6b7280; --purple:#8b5cf6; --pink:#ec4899;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  a{color:var(--red-soft);text-decoration:none}
  header{position:sticky;top:0;z-index:20;background:rgba(10,10,10,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:env(safe-area-inset-top) 14px 0}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px}
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand b{font-size:18px;letter-spacing:.5px}
  .brand span{color:var(--red-soft);font-weight:800}
  .date{font-size:12px;color:var(--muted)}
  .tabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:8px 14px;border-radius:999px;background:var(--panel2);
    color:var(--muted);font-size:14px;font-weight:600;border:1px solid var(--line);cursor:pointer}
  .tab.active{background:var(--red);color:#fff;border-color:var(--red)}
  .tab .n{opacity:.7;font-weight:700;margin-left:5px;font-size:12px}
  main{padding:14px 12px 90px;max-width:760px;margin:0 auto}
  .dayhead{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 12px}
  .dayhead h2{margin:0;font-size:15px;color:var(--muted);font-weight:600}
  .progress{font-size:13px;color:var(--muted)}
  .progress b{color:var(--txt)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:14px;overflow:hidden}
  .card.done{opacity:.62}
  .crow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .cname{font-size:17px;font-weight:700;line-height:1.25;margin:0}
  .badges{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 0}
  .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.3px}
  .b-p1{background:rgba(204,20,20,.18);color:#ff7a7a}
  .b-p2{background:rgba(245,158,11,.16);color:#fcd34d}
  .b-p3{background:rgba(107,114,128,.18);color:#cbd5e1}
  .b-region{background:rgba(59,130,246,.15);color:#93c5fd}
  .b-status{background:rgba(40,167,69,.15);color:#86efac}
  .meta{margin:12px 0 0;font-size:14px;line-height:1.55}
  .meta .row{display:flex;gap:8px;margin:5px 0;align-items:flex-start}
  .meta .ic{width:18px;flex:0 0 18px;text-align:center;opacity:.85}
  .meta .k{color:var(--muted)}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;
    border-radius:10px;font-size:14px;font-weight:700;border:1px solid var(--line);
    background:var(--panel2);color:var(--txt);cursor:pointer;text-align:center}
  .btn.call{background:#15311c;border-color:#1f5130;color:#a7f3c0}
  .btn.dir{background:#14233f;border-color:#1e3a63;color:#a8c8ff}
  .btn.full{grid-column:1 / -1}
  .opener{margin-top:12px;background:var(--panel2);border:1px dashed var(--line);
    border-radius:10px;padding:0 12px;max-height:0;overflow:hidden;transition:max-height .25s ease,padding .25s ease}
  .opener.open{max-height:600px;padding:12px}
  .opener h4{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--red-soft)}
  .opener p{margin:0 0 8px;font-size:14px;line-height:1.5;color:#e4e4e4}
  .toggle{margin-top:10px;font-size:13px;font-weight:700;color:var(--red-soft);cursor:pointer;
    display:inline-flex;align-items:center;gap:6px}
  .outcome{margin-top:12px}
  .outcome .lab{font-size:12px;color:var(--muted);margin-bottom:6px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12px;font-weight:600;padding:7px 10px;border-radius:999px;
    background:var(--panel2);border:1px solid var(--line);color:var(--muted);cursor:pointer}
  .chip.sel{background:var(--red);border-color:var(--red);color:#fff}
  textarea{width:100%;margin-top:10px;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;color:var(--txt);padding:10px;font-size:14px;font-family:inherit;
    resize:vertical;min-height:54px}
  .empty{text-align:center;color:var(--muted);padding:40px 16px;font-size:14px}
  footer{position:fixed;left:0;right:0;bottom:0;z-index:20;
    background:rgba(10,10,10,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px}
  footer .btn{flex:1}
  footer .btn.primary{background:var(--red);border-color:var(--red);color:#fff}
  .hint{font-size:11px;color:var(--muted);text-align:center;margin:2px 2px 14px}
  .tip{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--red);
    border-radius:10px;padding:11px 13px;font-size:13px;line-height:1.5;color:#dcdcdc;margin-bottom:14px}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><b>TBG<span>·</span>Walk-Ins</b></div>
    <div class="date" id="today"></div>
  </div>
  <div class="tabs" id="tabs"></div>
</header>
<main>
  <div class="tip" id="daytip"></div>
  <div class="dayhead">
    <h2 id="dayLabel"></h2>
    <div class="progress" id="prog"></div>
  </div>
  <div id="list"></div>
  <p class="hint">Outcomes &amp; notes save on this phone automatically. Tap “Sync” to send the day’s log back for the CRM.</p>
</main>
<footer>
  <button class="btn" id="btnReset">Clear day status</button>
  <button class="btn primary" id="btnSync">Sync day →</button>
</footer>
<script src="/walkins-data.js"></script>
<script src="/walkins.js"></script>
</body>
</html>
