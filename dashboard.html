<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#cc1414" />
<title>TBG — Cold Email System</title>
<style>
  :root{--bg:#0a0a0a;--panel:#151515;--panel2:#1d1d1d;--line:#2a2a2a;--red:#cc1414;--red2:#ff5a5a;--txt:#f2f2f2;--muted:#9a9a9a;--green:#34d399;--blue:#60a5fa;--amber:#fbbf24}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:14px;padding:24px}
  #gate h1{font-size:22px;margin:0}#gate p{color:var(--muted);font-size:13px;margin:0;text-align:center;max-width:340px}
  #gate input{background:var(--panel2);border:1px solid var(--line);color:#fff;padding:12px 14px;border-radius:10px;font-size:16px;width:240px;text-align:center}
  #gate button{background:var(--red);color:#fff;border:0;padding:12px 22px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer}
  #err{color:var(--red2);font-size:13px;min-height:16px}
  #app{display:none;max-width:1100px;margin:0 auto;padding:14px 14px 70px}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  header h1{font-size:19px;margin:0}header h1 span{color:var(--red2)}
  .sub{color:var(--muted);font-size:12px}
  nav{display:flex;gap:6px;margin:12px 0 16px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:10}
  nav button{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:9px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer}
  nav button.on{background:var(--red);color:#fff;border-color:var(--red)}
  .tab{display:none}.tab.on{display:block}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px;margin:8px 0 16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px}
  .kpi .v{font-size:25px;font-weight:800;line-height:1.1}.kpi .l{color:var(--muted);font-size:12px;margin-top:4px}
  .kpi.win .v{color:var(--green)}.kpi.money .v{color:var(--red2)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:740px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .card h2{font-size:14px;margin:0 0 12px;color:#fff;text-transform:uppercase;letter-spacing:.5px}
  .bar{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:13px}
  .bar .lab{width:110px;flex:0 0 110px;color:var(--muted)}
  .bar .track{flex:1;background:var(--panel2);border-radius:6px;height:18px;overflow:hidden}
  .bar .fill{height:100%;border-radius:6px}.bar .n{width:30px;flex:0 0 30px;text-align:right;font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 6px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;position:sticky;top:54px;background:var(--panel)}
  .pill{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .amt{font-weight:700;text-align:right}
  ul.list{margin:0;padding:0;list-style:none}ul.list li{padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.45}ul.list li b{color:#fff}
  .search{width:100%;background:var(--panel2);border:1px solid var(--line);color:#fff;padding:10px 12px;border-radius:10px;font-size:14px;margin-bottom:12px}
  .btn{display:inline-block;background:var(--panel2);border:1px solid var(--line);color:var(--red2);padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none}
  .btn:hover{border-color:var(--red)}
  .tmpl{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:12px}
  .tmpl .top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
  .tmpl .day{font-size:11px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:.5px}
  .tmpl .subj{font-size:12px;color:var(--muted);margin-bottom:6px}.tmpl .subj b{color:#fff}
  .tmpl pre{white-space:pre-wrap;font-family:inherit;font-size:12.5px;line-height:1.5;margin:0;color:#dcdcdc}
  .cad{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .cad div{flex:1;min-width:120px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:12px}
  .cad div b{display:block;color:var(--red2);font-size:13px;margin-bottom:3px}
  footer{color:var(--muted);font-size:11px;text-align:center;margin-top:18px;line-height:1.6}
  .note{font-size:12px;color:var(--muted);line-height:1.5}
</style>
</head>

  <input id="code" type="password" autocomplete="off" placeholder="password" />
  <button onclick="unlock()">Unlock</button>
  <div id="err"></div>
</div>
<div id="app"></div>

function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function deriveKey(p){var k=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(BLOB.s),iterations:150000,hash:'SHA-256'},k,{name:'AES-GCM',length:256},false,['decrypt']);}
async function decrypt(p){var key=await deriveKey(p);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(BLOB.i)},key,b64(BLOB.c));
  return JSON.parse(new TextDecoder().decode(pt));}

var T=null;
function money(n){return n==null?"—":"$"+Number(n).toLocaleString();}
var SC={Won:"#34d399",Bidding:"#ff5a5a",Replied:"#fbbf24",Qualifying:"#a78bfa",Contacted:"#60a5fa",Cold:"#6b7280"};
function pill(s){var c=SC[s]||"#6b7280";return '<span class="pill" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'55">'+s+'</span>';}
function bars(arr){var m=Math.max.apply(null,arr.map(function(x){return x.n;}))||1;
  return arr.map(function(x){return '<div class="bar"><span class="lab">'+x.k+'</span><span class="track"><span class="fill" style="width:'+(x.n/m*100)+'%;background:'+x.c+'"></span></span><span class="n">'+x.n+'</span></div>';}).join("");}

function mailtoFor(co){
  var t=T.templates[0];
  var name=co.c?co.c:(co.n+" team");
  var subj=t.subj.replace("[their project / street]", co.h||co.n);
  var body=t.body.replace("[Name / Team]",name).replace("[One specific line about THEIR project — pull from the lead's hook, e.g. \"Saw your 24-unit wood-frame at 14220 SE Newport Way\"]","Saw "+(co.h||"your recent work")).replace(/\[project\]/g, co.h||"your project");
  return "mailto:"+(co.e||"")+"?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);
}

function renderDash(){
  var k=T.kpis;
  return '<div class="kpis">'
   +'<div class="kpi money"><div class="v">$'+(k.pipeline/1e6).toFixed(2)+'M</div><div class="l">Active pipeline</div></div>'
   +'<div class="kpi win"><div class="v">'+money(k.won)+'</div><div class="l">Won</div></div>'
   +'<div class="kpi"><div class="v">'+k.bids+'</div><div class="l">Bids / pursuits</div></div>'
   +'<div class="kpi"><div class="v">'+k.companies+'</div><div class="l">Companies</div></div>'
   +'<div class="kpi"><div class="v">'+k.sent+'</div><div class="l">Cold emails sent</div></div>'
   +'<div class="kpi"><div class="v">'+k.replyRate+'</div><div class="l">Reply rate</div></div></div>'
   +'<div class="grid"><div class="card"><h2>Pipeline by status</h2>'+bars(T.bidsByStatus)+'</div>'
   +'<div class="card"><h2>Outreach funnel</h2>'+bars(T.outreach)+'</div></div>'
   +'<div class="card"><h2>💰 Bids / pipeline</h2><table><thead><tr><th>Project</th><th>GC</th><th>Status</th><th style="text-align:right">Amount</th></tr></thead><tbody>'
   +T.bids.map(function(b){return '<tr><td><b>'+b.p+'</b></td><td>'+b.gc+'</td><td>'+pill(b.s)+'</td><td class="amt">'+money(b.amt)+'</td></tr>';}).join("")
   +'</tbody></table></div>'
   +'<div class="grid"><div class="card"><h2>🔥 Hot replies</h2><ul class="list">'+T.hot.map(function(h){return '<li>'+h+'</li>';}).join("")+'</ul></div>'
   +'<div class="card"><h2>🟢 Do now this week</h2><ul class="list">'+T.doNow.map(function(d){return '<li>'+d+'</li>';}).join("")+'</ul></div></div>';
}
function renderDB(){
  var rows=T.companies.map(function(co,i){return '<tr data-s="'+(co.n+' '+(co.c||'')+' '+(co.e||'')+' '+(co.h||'')+' '+co.s).toLowerCase()+'">'
    +'<td><b>'+co.n+'</b>'+(co.h?'<div class="note">'+co.h+'</div>':'')+'</td>'
    +'<td>'+(co.c||'—')+'<div class="note">'+(co.e||'')+'</div></td>'
    +'<td>'+pill(co.s)+'</td>'
    +'<td>'+(co.e?'<a class="btn" href="'+mailtoFor(co)+'">✉️ Email</a>':'—')+'</td></tr>';}).join("");
  return '<div class="card"><h2>📇 Contact database · '+T.companies.length+' companies</h2>'
   +'<input class="search" id="q" placeholder="Search company, contact, status…" oninput="filterDB()" />'
   +'<table><thead><tr><th>Company</th><th>Contact</th><th>Status</th><th>Action</th></tr></thead><tbody id="dbbody">'+rows+'</tbody></table></div>';
}
function filterDB(){var q=document.getElementById('q').value.toLowerCase();
  Array.prototype.forEach.call(document.querySelectorAll('#dbbody tr'),function(tr){tr.style.display=tr.getAttribute('data-s').indexOf(q)>-1?'':'none';});}
function renderEmail(){
  var cad='<div class="cad">'+T.cadence.map(function(c){return '<div><b>'+c.d+'</b>'+c.t+'</div>';}).join("")+'</div>';
  var tmpls=T.templates.map(function(t){return '<div class="tmpl"><div class="top"><span class="day">'+t.day+'</span>'
    +'<span class="btn" onclick="copyT('+t.id+')">Copy</span></div>'
    +'<div class="subj">Subject: <b>'+t.subj+'</b></div><pre id="t'+t.id+'">'+t.body+'</pre></div>';}).join("");
  var ops='<ul class="list">'+T.ops.map(function(o){return '<li>'+o+'</li>';}).join("")+'</ul>';
  return '<div class="card"><h2>📧 The cadence — 4 touches / 14 days</h2>'+cad
   +'<p class="note">Stop on any reply → move to <b>Replied</b>. Per-company, not per-permit. One ask, name their project, always include phone.</p></div>'
   +'<div class="card"><h2>✍️ Templates (your real voice)</h2>'+tmpls+'</div>'
   +'<div class="card"><h2>⚙️ Operating rules (throughput & safety)</h2>'+ops+'</div>';
}
function copyT(id){var el=document.getElementById('t'+id);navigator.clipboard.writeText(el.textContent).then(function(){
  event.target.textContent='Copied ✓';setTimeout(function(){event.target.textContent='Copy';},1500);});}

function show(tab){
  ['dash','db','email'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('on',t===tab);
    document.getElementById('nav-'+t).classList.toggle('on',t===tab);});
}
function render(){
  document.getElementById('app').innerHTML=''
   +'<header><h1>TBG <span>·</span> Cold Email System</h1><span class="sub">🔓 decrypted · updated '+T.updated+'</span></header>'
   +'<nav><button id="nav-dash" class="on" onclick="show(\'dash\')">📊 Dashboard</button>'
   +'<button id="nav-db" onclick="show(\'db\')">📇 Database</button>'
   +'<button id="nav-email" onclick="show(\'email\')">📧 Email System</button></nav>'
   +'<div id="tab-dash" class="tab on">'+renderDash()+'</div>'
   +'<div id="tab-db" class="tab">'+renderDB()+'</div>'
   +'<div id="tab-email" class="tab">'+renderEmail()+'</div>'
   +'<footer>Twin Brothers Group LLC · encrypted internal system · 14205 SE 36th St, Ste 100, Bellevue WA 98006</footer>';
}
async function unlock(){var p=document.getElementById('code').value,e=document.getElementById('err');e.textContent='decrypting…';
  try{T=await decrypt(p);try{sessionStorage.setItem('tbg_pw',p);}catch(x){}
    document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';render();
  }catch(err){e.textContent='Wrong password.';document.getElementById('code').value='';}}
document.getElementById('code').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
try{var sp=sessionStorage.getItem('tbg_pw');if(sp){document.getElementById('code').value=sp;unlock();}}catch(e){}
</script>
</body>
