<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#cc1414" />
<title>TBG — Cold Approach Dashboard</title>
<link rel="icon" href="/icons/icon.svg" />
<style>
  :root{--bg:#0a0a0a;--panel:#151515;--panel2:#1d1d1d;--line:#2a2a2a;--red:#cc1414;--red2:#ff5a5a;--txt:#f2f2f2;--muted:#9a9a9a;--green:#34d399}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:14px;padding:24px}
  #gate h1{font-size:20px;margin:0}#gate p{color:var(--muted);font-size:13px;margin:0;text-align:center;max-width:320px}
  #gate input{background:var(--panel2);border:1px solid var(--line);color:#fff;padding:12px 14px;border-radius:10px;font-size:16px;width:240px;text-align:center}
  #gate button{background:var(--red);color:#fff;border:0;padding:12px 22px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer}
  #err{color:var(--red2);font-size:13px;min-height:16px}
  #app{display:none;max-width:1100px;margin:0 auto;padding:18px 16px 60px}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px}
  header h1{font-size:20px;margin:0}header h1 span{color:var(--red2)}
  .sub{color:var(--muted);font-size:12px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .kpi .v{font-size:26px;font-weight:800;line-height:1.1}.kpi .l{color:var(--muted);font-size:12px;margin-top:4px}
  .kpi.win .v{color:var(--green)}.kpi.money .v{color:var(--red2)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:740px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .card h2{font-size:14px;margin:0 0 12px;color:#fff;text-transform:uppercase;letter-spacing:.5px}
  .bar{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:13px}
  .bar .lab{width:120px;flex:0 0 120px;color:var(--muted)}
  .bar .track{flex:1;background:var(--panel2);border-radius:6px;height:18px;overflow:hidden}
  .bar .fill{height:100%;border-radius:6px}.bar .n{width:32px;flex:0 0 32px;text-align:right;font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase}
  td .pill{font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;background:#2a2a2a;color:#cbd5e1}
  .amt{font-weight:700;text-align:right}
  ul.list{margin:0;padding:0;list-style:none}ul.list li{padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.45}ul.list li b{color:#fff}
  footer{color:var(--muted);font-size:11px;text-align:center;margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<div id="gate">
  <h1>🔒 TBG Dashboard</h1>
  <p>This dashboard is end-to-end encrypted. Enter the team password to decrypt it in your browser.</p>
  <input id="code" type="password" autocomplete="off" placeholder="password" />
  <button onclick="unlock()">Unlock</button>
  <div id="err"></div>
</div>
<div id="app"></div>

function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function deriveKey(pass){
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(BLOB.s),iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function decrypt(pass){
  var key=await deriveKey(pass);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(BLOB.i)},key,b64(BLOB.c));
  return JSON.parse(new TextDecoder().decode(pt));
}
function money(n){return n==null?"—":"$"+n.toLocaleString();}
function bars(arr){var max=Math.max.apply(null,arr.map(function(x){return x.n;}))||1;
  return arr.map(function(x){return '<div class="bar"><span class="lab">'+x.k+'</span><span class="track"><span class="fill" style="width:'+(x.n/max*100)+'%;background:'+x.c+'"></span></span><span class="n">'+x.n+'</span></div>';}).join("");}

   +'<footer>Twin Brothers Group LLC · encrypted internal dashboard · data from Claude Cowork trackers</footer>';
}
async function unlock(){
  var p=document.getElementById('code').value, e=document.getElementById('err');
  e.textContent='decrypting…';
  try{ var T=await decrypt(p); try{sessionStorage.setItem('tbg_pw',p);}catch(x){}
    document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';render(T);
  }catch(err){ e.textContent='Wrong password.'; document.getElementById('code').value=''; }
}
document.getElementById('code').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
try{var sp=sessionStorage.getItem('tbg_pw'); if(sp){document.getElementById('code').value=sp;unlock();}}catch(e){}
